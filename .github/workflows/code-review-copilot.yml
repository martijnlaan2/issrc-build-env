name: Copilot Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - code-review

jobs:
  copilot-review:
    # Only set the topic `has-issrc-build-env-sync-token` if the secret is available
    if: contains(github.event.repository.topics, 'has-issrc-build-env-sync-token')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot review
        run: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-reviewer @copilot
        env:
          GITHUB_TOKEN: ${{ secrets.ISSRC_BUILD_ENV_SYNC_TOKEN }}
