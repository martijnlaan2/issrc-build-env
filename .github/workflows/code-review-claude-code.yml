name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - code-review

jobs:
  claude-review:
    # Only set the topic `has-claude-code-oauth-token` if the secret is available
    if: contains(github.event.repository.topics, 'has-claude-code-oauth-token')
    runs-on: ubuntu-latest
    permissions:
      contents: read       # for actions/checkout
      pull-requests: write # for gh pr
      id-token: write      # for OIDC token exchange of claude-code-action
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the changes in PR #${{ github.event.pull_request.number }} of repository ${{ github.repository }}.

            Steps:
            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to get the changes.
            2. Analyze the diff for bugs, security issues, and style problems. Focus only on the changed lines, not pre-existing issues.
            3. Read CLAUDE.md and AGENTS.md in full for project-specific guidelines and verify compliance.
            4. If there are issues, write the review to a file named review.md in the current directory, then post it using `gh pr comment ${{ github.event.pull_request.number }} -F review.md`. If there are no issues, do nothing.

            Keep the review concise and actionable. Do not review trivial or automated changes.
          claude_args: |
            --allowedTools "Read,Write,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          show_full_output: true
